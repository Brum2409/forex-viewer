<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0e14" />
  <meta name="description" content="Live stock & ETF prices with interactive charts — real market data, no signup." />
  <title>Ticker — Live Stocks & ETFs</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2316c784'/%3E%3Cpath d='M20 65 L40 45 L55 58 L80 30' stroke='%230b0e14' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <div class="brand-icon">📈</div>
      <span class="brand-name">Ticker</span>
    </div>
    <div class="status">
      <span class="dot" id="liveDot"></span>
      <span id="statusTxt" class="status-txt">Loading…</span>
      <button class="icon-btn" id="refreshBtn" title="Refresh">↻</button>
    </div>
  </header>

  <div class="search-wrap">
    <input id="searchInput" class="search-input" type="search"
      placeholder="Search & add a stock or ETF — e.g. AAPL, Tesla, VOO"
      autocomplete="off" spellcheck="false" />
    <div id="searchResults" class="search-results" hidden></div>
  </div>

  <main class="content" id="watchlist">
    <div class="center-msg" id="initLoader">
      <div class="loader"></div>
      <span>Fetching live prices…</span>
    </div>
  </main>

  <footer class="footer">
    Data via Yahoo Finance · prices may be delayed · not investment advice
  </footer>
</div>

<!-- Detail overlay -->
<div class="overlay" id="overlay" hidden>
  <div class="sheet">
    <div class="sheet-head">
      <button class="icon-btn back-btn" id="backBtn" title="Close">‹</button>
      <div class="sheet-title">
        <div class="sheet-symbol" id="dSymbol">—</div>
        <div class="sheet-name" id="dName">—</div>
      </div>
      <button class="icon-btn" id="removeBtn" title="Remove from list">🗑</button>
    </div>

    <div class="sheet-price">
      <span class="big-price" id="dPrice">—</span>
      <span class="big-change" id="dChange">—</span>
    </div>

    <div class="range-tabs" id="rangeTabs">
      <button data-range="5d"  data-interval="15m">1W</button>
      <button data-range="1mo" data-interval="1d" class="active">1M</button>
      <button data-range="6mo" data-interval="1d">6M</button>
      <button data-range="1y"  data-interval="1d">1Y</button>
      <button data-range="5y"  data-interval="1wk">5Y</button>
    </div>

    <div class="chart-wrap">
      <div id="chart"></div>
      <div class="chart-loader" id="chartLoader" hidden><div class="loader"></div></div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
