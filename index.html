<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Live forex rates updated every 15 minutes — optimized for mobile">
  <title>FX Live — Forex Rates</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
<div class="app">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="header">
    <div class="header-brand">
      <div class="brand-icon">FX</div>
      <div>
        <div class="brand-text">FX Live</div>
        <div class="brand-sub">Forex Market Rates</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
        <span class="spin-icon" id="spinIcon">↻</span>
        <span id="refreshLabel">Refresh</span>
      </button>
    </div>
  </header>

  <!-- ── Status ─────────────────────────────────────────── -->
  <div class="status-bar">
    <div><span class="live-dot" id="liveDot"></span><span id="statusTxt">Loading…</span></div>
    <div id="countdownTxt"></div>
  </div>

  <!-- ── Search ─────────────────────────────────────────── -->
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="search"
      placeholder="Search pairs, e.g. EUR, JPY, GBP…"
      oninput="onSearch(this.value)"
      autocomplete="off" spellcheck="false">
  </div>

  <!-- ── Main list ───────────────────────────────────────── -->
  <main class="content" id="mainContent">
    <div class="center-msg" id="initLoader">
      <div class="loader"></div>
      <span>Fetching live rates…</span>
    </div>
  </main>

  <!-- ── Detail slide-over ──────────────────────────────── -->
  <div class="detail" id="detail" role="dialog" aria-modal="true">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()" aria-label="Close">
        ‹ Back
      </button>
      <div class="d-title">
        <div class="d-pair" id="dPair">—</div>
        <div class="d-full" id="dFull">—</div>
      </div>
      <div class="d-right">
        <div class="d-rate" id="dRate">—</div>
        <div class="d-chg"  id="dChg">—</div>
      </div>
    </div>

    <!-- Time interval buttons -->
    <div class="periods">
      <button class="period-btn active" data-iv="1m"  onclick="setChartInterval(this,'1m')">1m</button>
      <button class="period-btn"        data-iv="5m"  onclick="setChartInterval(this,'5m')">5m</button>
      <button class="period-btn"        data-iv="15m" onclick="setChartInterval(this,'15m')">15m</button>
      <button class="period-btn"        data-iv="30m" onclick="setChartInterval(this,'30m')">30m</button>
      <button class="period-btn"        data-iv="1h"  onclick="setChartInterval(this,'1h')">1h</button>
      <button class="period-btn"        data-iv="2h"  onclick="setChartInterval(this,'2h')">2h</button>
      <button class="period-btn"        data-iv="4h"  onclick="setChartInterval(this,'4h')">4h</button>
      <button class="period-btn"        data-iv="1D"  onclick="setChartInterval(this,'1D')">1D</button>
      <button class="period-btn"        data-iv="1W"  onclick="setChartInterval(this,'1W')">1W</button>
    </div>

    <div class="chart-wrap">
      <canvas id="mainChart"></canvas>
      <div class="chart-loading" id="chartLoader" style="display:none">
        <div class="loader"></div>
      </div>
    </div>

    <div class="detail-body">
      <div class="multi-tf" id="multiTf"></div>
      <div class="stats-grid" id="statsGrid"></div>
      <div id="infoBlock"></div>
    </div>
  </div>

</div><!-- .app -->

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/detail.js"></script>
<script src="js/app.js"></script>
</body>
</html>
